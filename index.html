<!DOCTYPE html>
<html>
<head>
    <title>Tanya's First Project</title>
    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
           body {
    background: linear-gradient(to right, #667eea, #764ba2);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: white;
}
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }
        input {
            padding: 8px;
            border-radius: 6px;
            border: none;
            margin-right: 5px;
        }
        button {
            background-color: white;
            color: #764ba2;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ddd;
        }
        #taskList {
            list-style: none;
            padding: 0;
        }
        #taskList li {
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Hello, I'm Tanya 👋</h1>
        <p>Beginner Developer | Learning & Building 🚀</p>
        <p>I am a student learning web development and preparing for hackathons.</p>

        <input type="text" id="taskInput" placeholder="Enter your task" />
        <button onclick="addTask()">Add Task</button>

        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let task = input.value;

            if (task === "") return;

            let li = document.createElement("li");

            let span = document.createElement("span");
            span.innerText = task;

            let btn = document.createElement("button");
            btn.innerText = "❌";
            btn.style.marginLeft = "10px";

            btn.onclick = function() {
                li.remove();
            };

            li.appendChild(span);
            li.appendChild(btn);

            document.getElementById("taskList").appendChild(li);

            input.value = "";
        }
    </script>

</body>
</html>
